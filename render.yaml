services:
  - type: web
    name: tsn-stock
    env: node
    plan: free
    buildCommand: bash ./render-build.sh
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_REGISTRY
        value: https://registry.npmjs.org/
      - key: NPM_CONFIG_PACKAGE_LOCK
        value: "false"
      - key: NPM_CONFIG_AUDIT
        value: "false"
      - key: NPM_CONFIG_FUND
        value: "false"
      - key: NPM_CONFIG_PROGRESS
        value: "false"
      - key: NPM_CONFIG_FETCH_RETRIES
        value: "5"
      - key: NPM_CONFIG_FETCH_TIMEOUT
        value: "300000"
      - key: TSN_STOCK_REFRESH_MS
        value: "2000"
      - key: TSN_API_CONNECT_TIMEOUT_MS
        value: "30000"
      - key: TSN_API_RETRY_COUNT
        value: "2"
      - key: TSN_STOCK_MARKET_TIMEZONE
        value: Europe/Copenhagen
      - key: TSN_STOCK_ENABLE_RESET
        value: "false"
      - key: TSN_STOCK_ANTI_SPAM
        value: "true"
      - key: TSN_STOCK_SPAM_MESSAGE_CAP_PER_USER_PER_HOUR
        value: "8"
      - key: TSN_STOCK_SPAM_POST_CAP_PER_USER_PER_HOUR
        value: "3"
      - key: TSN_STOCK_SPAM_DUPLICATE_WINDOW_MS
        value: "120000"
      - key: TSN_STOCK_SPAM_MIN_UNIQUE_USERS_FOR_FULL_BOOST
        value: "2"
      - key: TSN_STOCK_MAX_HISTORY
        value: "302400"
