services:
  - type: web
    name: tsn-stock
    env: node
    plan: free
    buildCommand: npm cache clean --force && npm install --omit=dev --no-audit --no-fund --prefer-online
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20.12.2
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_AUDIT
        value: "false"
      - key: NPM_CONFIG_FUND
        value: "false"
      - key: NPM_CONFIG_PROGRESS
        value: "false"
      - key: TSN_STOCK_REFRESH_MS
        value: "2000"
      - key: TSN_STOCK_MAX_HISTORY
        value: "302400"
